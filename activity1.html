<!DOCTYPE html>
<html>

<head>
    <title>Website</title>
    <link rel="stylesheet" href="style.css">
    <style>
    body, html{
    height:100%;
    margin:0;
    font-size:16px;
    font-family: Georgia, 'Times New Roman', Times, serif;
    font-weight:4000;
    line-height:1.8em;
    color:#666;
    background-color: black;
    }
    
    .topnav {
    overflow: hidden;
    background-color: #333;
    }
    
    .topnav a {
    display: inline;
    color: #1affa3;
    text-align: center;
    padding: 14px 16px;
    text-decoration: none;
    }
    
    .topnav a:hover {
    background-color: #333;
    color: black;
    }
    
    .pimg1, .pimg2, .pimg3 {
    position:relative;
    opacity: 0.70;
    background-position:center;
    background-size:cover;
    background-repeat:no-repeat;
    background-attachment:fixed;
    }
    
    .pimg1 {
    background-image:url('image1.jpg');
    min-height:100%;
    }
    
    .pimg2 {
    background-image:url('image2.jpg');
    min-height:400px;
    }
    
    .pimg3 {
    background-image:url('image3.jpg');
    min-height:400px;
    }
    
    .section {
    text-align:center;
    padding:50px 80px;
    }
    
    .section-light{
    background-color:#f4f4f4;
    color:#666;
    }
    
    .section-dark{
    background-color:#282e34;
    color:#ddd;
    }
    
    .ptext {
    position:absolute;
    top:50%;
    width:100%;
    text-align:center;
    color:#000;
    font-size:27px;
    letter-spacing:8px;
    text-transform:uppercase;
    }
    
    .ptext .border {
    background-color:#111;
    color:#fff;
    padding:20px;
    }
    
    .ptext .border.trans {
    background-color:transparent;
    }
    
    @media(max-width:568px){
    .pimg1, .pimg2, .pimg3 {
    background-attachment:scroll;
    }
    }

    </style>

</head>

<body>
    <div class="topnav">
        <a class="active" href="#home">Home</a>
        <a href="#about">About-Me</a>
        <a href="#contact">Gallery</a>
        <a href="#contact">Contact-Us</a>
    </div><br>

    <span class="border trans" style="font-size:40px;">
        <center>Welcome all to this website</center>
    </span><br>

    <section class="section section-dark">
        <h2>Section One</h2>
        <p>
            Web development is the work involved in developing a Web site for the Internet (World Wide Web) or an
            intranet (a private network).
        </p>
    </section>

    <div class="pimg3">
        <div class="ptext">
            <span class="border trans">Image Two Text</span>
        </div>
    </div>

    <section class="section section-dark">
        <span>All @copy rights reserved by Swati Singh</span>
    </section>
    <section>
        <img class="mySlides" src="https://w0.peakpx.com/wallpaper/968/703/HD-wallpaper-cool-random-object-nice-object-random-town-day-clouds-sky.jpg" style="height:500px; width:1340px;">

        <img class="mySlides" src="https://randomcitygenerator.com/wp-content/uploads/2021/12/marian-rotea-9XKSfBTHJOY-unsplash-scaled.jpg" style="height:500px; width:1340px;">
        <img class="mySlides" src="https://i.natgeofe.com/k/5b396b5e-59e7-43a6-9448-708125549aa1/new-york-statue-of-liberty.jpg" style="height:500px; width:1340px;">
    </section>
    
    <script>
        // Automatic Slideshow - change image every 3 seconds
        var myIndex = 0;
        carousel();

        function carousel() {
            var i;
            var x = document.getElementsByClassName("mySlides");
            for (i = 0; i < x.length; i++) {
                x[i].style.display = "none";
            }
            myIndex++;
            if (myIndex > x.length) { myIndex = 1 }
            x[myIndex - 1].style.display = "block";
            setTimeout(carousel, 3000);
        }
    </script>

</body>

</html>
